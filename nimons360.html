<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimons360 — Open in App</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f4f3f8;
            color: #1e1d26;
            text-align: center;
            padding: 24px;
        }
        .card {
            background: white;
            border-radius: 22px;
            padding: 32px 24px;
            max-width: 360px;
            width: 100%;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 4px solid #e5e1ec;
            border-top-color: #1565c0;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h2 { margin: 0 0 8px; font-size: 20px; }
        p { margin: 0 0 20px; color: #5c5870; font-size: 14px; }
        a {
            display: inline-block;
            background: #1565c0;
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 15px;
        }
    </style>
    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const familyId = params.get('familyId') || '';
            const code = params.get('code') || '';
            const deepLink = 'nimons360://family/' + familyId + '?code=' + code;

            var link = document.getElementById('manual-link');
            if (link) link.href = deepLink;

            window.location.href = deepLink;

            setTimeout(function() {
                var card = document.getElementById('fallback');
                if (card) card.style.display = 'block';
            }, 1500);
        })();
    </script>
</head>
<body>
    <div class="card">
        <div class="spinner"></div>
        <h2>Opening Nimons360...</h2>
        <p>You'll be redirected to the app automatically.</p>
        <div id="fallback" style="display:none;">
            <p style="margin-bottom:16px;color:#b12b2b;">Didn't open? Tap below.</p>
            <a id="manual-link" href="#">Open in Nimons360</a>
        </div>
    </div>
</body>
</html>
